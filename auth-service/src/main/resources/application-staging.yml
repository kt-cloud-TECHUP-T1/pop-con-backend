app:
  oauth:
    base-url: ${OAUTH_BASE_URL}
    redirect-path: /auth/oauth/{provider}/callback
    state-ttl-seconds: ${STATE_TTL_SECONDS:300}

    kakao:
      client-id: ${KAKAO_CLIENT_ID}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      authorize-url: https://kauth.kakao.com/oauth/authorize
      token-url: https://kauth.kakao.com/oauth/token
      userinfo-url: https://kapi.kakao.com/v2/user/me
      scopes:
        - profile_nickname
        - account_email

    naver:
      client-id: ${NAVER_CLIENT_ID}
      client-secret: ${NAVER_CLIENT_SECRET}
      authorize-url: https://nid.naver.com/oauth2.0/authorize
      token-url: https://nid.naver.com/oauth2.0/token
      userinfo-url: https://openapi.naver.com/v1/nid/me
      scopes:
        - name
        - email
        - profile_image

  frontend:
    base-url: ${FRONTEND_BASE_URL}
    home-path: /
    verify-path: /verify
    login-path: /login
    callback-path: /callback
    cookie-secure: true
    cookie-same-site: None
    cookie-domain: .popcon.store

services:
  user-service:
    url: ${USER_SERVICE_URL:http://backend-user-svc:8080}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000 # 10분, 유휴 커넥션 제거
      max-lifetime: 1800000 # 30분, 커넥션 최대 수명
      connection-timeout: 30000 # 30초, 커넥션 못얻으면 기다리는 시간
      validation-timeout: 5000 # 커넥션이 정상인지 확인할 때 최대 기다리는 시간
      keepalive-time: 300000 # 커넥션 ping
      pool-name: auth-pool # 커넥션 풀 이름 (메트릭 식별용)

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

logging:
  level:
    root: info
    org.hibernate: warn
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

server:
  port: 8080
  shutdown: graceful


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  endpoint:
    health:
      probes:
        enabled: true

  metrics:
    tags:
      application: auth-service