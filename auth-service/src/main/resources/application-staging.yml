app:
  oauth:
    base-url: ${OAUTH_BASE_URL}
    redirect-path: /auth/oauth/{provider}/callback
    state-ttl-seconds: ${STATE_TTL_SECONDS:300}

    kakao:
      client-id: ${KAKAO_CLIENT_ID}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      authorize-url: https://kauth.kakao.com/oauth/authorize
      token-url: https://kauth.kakao.com/oauth/token
      userinfo-url: https://kapi.kakao.com/v2/user/me
      scopes:
        - profile_nickname
        - account_email

    naver:
      client-id: ${NAVER_CLIENT_ID}
      client-secret: ${NAVER_CLIENT_SECRET}
      authorize-url: https://nid.naver.com/oauth2.0/authorize
      token-url: https://nid.naver.com/oauth2.0/token
      userinfo-url: https://openapi.naver.com/v1/nid/me
      scopes:
        - name
        - email
        - profile_image

  frontend:
    base-url: ${FRONTEND_BASE_URL}
    home-path: /
    verify-path: /verify
    login-path: /login
    callback-path: /auth/callback
    cookie-secure: true
    cookie-same-site: None
    cookie-domain: .popcon.store

services:
  user-service:
    url: ${USER_SERVICE_URL} local
    internal-secret: ${INTERNAL_API_SECRET:changeme-local-secret}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

logging:
  level:
    org.hibernate.SQL: info
    org.hibernate.orm.jdbc.bind: warn

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

server:
  port: 8080
  shutdown: graceful


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  endpoint:
    health:
      probes:
        enabled: true

  metrics:
    tags:
      application: auth-service