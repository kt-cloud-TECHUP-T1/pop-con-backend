openapi: 3.0.1
info:
  title: 인증 서비스 API 명세서
  description: 예약 및 드로우, 굿즈 관리 API
  version: 0.1.0
servers:
- url: http://localhost:8080
tags: []
paths:
  /auth/token/refresh:
    post:
      tags:
      - Token
      summary: 토큰 재발급
      description: |
        Refresh Token 쿠키를 사용하여 새로운 Access Token(바디)과 Refresh Token(쿠키)을 발급받습니다.

        [에러 케이스]
        - 400: refresh_token 쿠키 누락
        - 401 (A002): 인증 정보가 유효하지 않음 (refreshToken 위조/서명 실패)
        - 401 (A003): 인증 만료/세션 만료 (refreshToken 만료 또는 폐기됨)
        - 500 (S001): 서버 오류
      operationId: token-refresh-
      responses:
        '401':
          description: '401'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                token-refresh-fail-token-expired:
                  value: |-
                    {
                      "code" : "A003",
                      "message" : "인증이 만료되었습니다. 다시 로그인해주세요."
                    }
                token-refresh-fail-invalid-token:
                  value: |-
                    {
                      "code" : "A002",
                      "message" : "유효하지 않은 토큰입니다."
                    }
        '500':
          description: '500'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                token-refresh-fail-server-error:
                  value: |-
                    {
                      "code" : "S001",
                      "message" : "시스템 오류가 발생했습니다."
                    }
        '400':
          description: '400'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                token-refresh-fail-missing-cookie:
                  value: |-
                    {
                      "code" : "C001",
                      "message" : "입력값이 올바르지 않습니다."
                    }
        '200':
          description: '200'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                token-refresh-success:
                  value: |-
                    {
                      "code" : "SUCCESS",
                      "message" : "토큰이 재발급되었습니다.",
                      "data" : {
                        "accessToken" : "new.access.token",
                        "expiresIn" : 3600
                      }
                    }
components:
  schemas:
    ApiResponse:
      title: ApiResponse
      type: object
      properties:
        DEFAULT_SUCCESS_MESSAGE:
          type: string
          description: DEFAULT_SUCCESS_MESSAGE
          nullable: true
        code:
          type: string
          description: code
          nullable: true
        SUCCESS:
          type: string
          description: SUCCESS
          nullable: true
        data:
          type: object
          properties:
            expiresIn:
              type: number
              description: expiresIn
              nullable: true
            accessToken:
              type: string
              description: accessToken
              nullable: true
          description: data
        message:
          type: string
          description: message
          nullable: true
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
- bearerAuth: []
