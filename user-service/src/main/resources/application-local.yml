spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:mysql://localhost:${DB_PORT}/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    defer-datasource-initialization: true

  data:
    redis:
      host: localhost
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  http:
    client:
      connect-timeout: 3s
      read-timeout: 5s

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

server:
  port: 8081
  shutdown: graceful

services:
  draw-service:
    url: ${DRAW_SERVICE_URL:http://localhost:8084}
  auction-service:
    url: ${AUCTION_SERVICE_URL:http://localhost:8083}
  ticket-service:
    url: ${TICKET_SERVICE_URL:http://localhost:8086}
