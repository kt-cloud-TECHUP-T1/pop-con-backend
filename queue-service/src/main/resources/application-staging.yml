spring:
  config:
    import: classpath:application-metrics-slo.yml
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

encryption:
  secret: ${ENCRYPTION_SECRET}

server:
  port: 8080
  shutdown: graceful

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

logging:
  level:
    root: info
    com.t1.popcon.queue: debug

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  endpoint:
    health:
      probes:
        enabled: true

  metrics:
    tags:
      application: queue-service

