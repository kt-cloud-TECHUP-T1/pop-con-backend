name: CI - Build and Push to ECR

on:
  push:
    branches:
      - staging
      - main

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.short-sha.outputs.short_sha }}
      changes: ${{ steps.filter.outputs.changes }}
      java_services: ${{ steps.compute.outputs.java_services }}
      anti_macro: ${{ steps.compute.outputs.anti_macro }}

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: short-sha
        run: echo "short_sha=${GITHUB_SHA::10}" >> $GITHUB_OUTPUT

      # 서비스 추가 시 여기 한 곳만 수정하면 이후 모든 job에 자동 반영
      # Java 서비스는 반드시 'common/**'을 포함해 주세요.
      - name: Filter changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth-service:
              - 'auth-service/**'
              - 'common/**'
            user-service:
              - 'user-service/**'
              - 'common/**'
            popup-service:
              - 'popup-service/**'
              - 'common/**'
            auction-service:
              - 'auction-service/**'
              - 'common/**'
            draw-service:
              - 'draw-service/**'
              - 'common/**'
            queue_service:
              - 'queue-service/**'
              - 'common/**'
              - 'queue-common/**'
            queue_worker:
              - 'queue-worker/**'
              - 'common/**'
              - 'queue-common/**'
            anti-macro-service:
              - 'anti-macro-service/**'

      - name: Compute service lists
        id: compute
        run: |
          CHANGES='${{ steps.filter.outputs.changes }}'
          echo "java_services=$(echo "$CHANGES" | jq '[.[] | select(. != "anti-macro-service")]')" >> $GITHUB_OUTPUT
          echo "anti_macro=$(echo "$CHANGES"      | jq 'any(. == "anti-macro-service")')"          >> $GITHUB_OUTPUT

  # ── 빌드 + Docker 푸시 ───────────────────────────────────────────────────────
  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.changes != '[]'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.changes) }}

    steps:
      # ── Java 빌드 ────────────────────────────────────────────
      - uses: actions/checkout@v4
        if: matrix.service != 'anti-macro-service'

      - uses: actions/setup-java@v4
        if: matrix.service != 'anti-macro-service'
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build (Java)
        if: matrix.service != 'anti-macro-service'
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :${{ matrix.service }}:clean :${{ matrix.service }}:build

      # ── Node 빌드 ────────────────────────────────────────────
      - uses: actions/checkout@v4
        if: matrix.service == 'anti-macro-service'

      - uses: actions/setup-node@v4
        if: matrix.service == 'anti-macro-service'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: anti-macro-service/package-lock.json

      - name: Build (Node)
        if: matrix.service == 'anti-macro-service'
        run: cd anti-macro-service && npm ci && npm run build

      # ── 공통: Docker 푸시 ────────────────────────────────────
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:${{ needs.detect-changes.outputs.short_sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitOps 이벤트 ─────────────────────────────────
  notify:
    needs: [detect-changes, build-and-push]
    if: needs.build-and-push.result == 'success' && needs.detect-changes.outputs.changes != '[]'
    runs-on: ubuntu-latest

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update GitOps deployment
        run: |
          DEPLOY_ENV=${{ github.ref_name == 'main' && 'prod' || 'staging' }}
          curl --fail --show-error -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
            https://api.github.com/repos/kt-cloud-TECHUP-T1/gitops/dispatches \
            -d "{
              \"event_type\": \"deploy-v2\",
              \"client_payload\": {
                \"env\": \"${DEPLOY_ENV}\",
                \"image\": \"${{ steps.login-ecr.outputs.registry }}\",
                \"services\": ${{ needs.detect-changes.outputs.changes }},
                \"tag\": \"${{ needs.detect-changes.outputs.short_sha }}\"
              }
            }"
