name: CI(STAGING) - Build and Push to ECR

on:
  push:
    branches:
      - staging

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      auction: ${{ steps.filter.outputs.auction }}
      auth: ${{ steps.filter.outputs.auth }}
      user: ${{ steps.filter.outputs.user }}
      popup: ${{ steps.filter.outputs.popup }}
      common: ${{ steps.filter.outputs.common }}
      draw: ${{ steps.filter.outputs.draw }}
      anti_macro: ${{ steps.filter.outputs.anti_macro }}
      queue_service: ${{ steps.filter.outputs.queue_service }}
      queue_worker: ${{ steps.filter.outputs.queue_worker }}
      queue_common: ${{ steps.filter.outputs.queue_common }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter service
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth:
              - 'auth-service/**'
            user:
              - 'user-service/**'
            popup:
              - 'popup-service/**'
            auction:
              - 'auction-service/**'
            common:
              - 'common/**'
            draw:
              - 'draw-service/**'
            anti_macro:
              - 'anti-macro-service/**'
            queue_service:
              - 'queue-service/**'
            queue_worker:
              - 'queue-worker/**'
            queue_common:
              - 'queue-common/**'

  build-and-push:
    needs: detect-changes
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      matrix:
        include:
          - service: auth-service
            changed: ${{ needs.detect-changes.outputs.auth }}
          - service: user-service
            changed: ${{ needs.detect-changes.outputs.user }}
          - service: popup-service
            changed: ${{ needs.detect-changes.outputs.popup }}
          - service: auction-service
            changed: ${{ needs.detect-changes.outputs.auction }}
          - service: draw-service
            changed: ${{ needs.detect-changes.outputs.draw }}
          - service: queue-service
            changed: ${{ needs.detect-changes.outputs.queue_service }}
          - service: queue-worker
            changed: ${{ needs.detect-changes.outputs.queue_worker }}
    env:
      SHOULD_RUN: ${{ matrix.changed == 'true' || needs.detect-changes.outputs.common == 'true' || needs.detect-changes.outputs.queue_common == 'true' }}

    steps:
      - name: Checkout
        if: env.SHOULD_RUN == 'true'
        uses: actions/checkout@v4

      - name: Setup JDK
        if: env.SHOULD_RUN == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        if: env.SHOULD_RUN == 'true'
        run: chmod +x ./gradlew

      - name: Build service (Test + REST Docs)
        if: env.SHOULD_RUN == 'true'
        run: |
          ./gradlew --no-daemon :${{ matrix.service }}:clean :${{ matrix.service }}:build

      - name: Configure AWS credentials
        if: env.SHOULD_RUN == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        if: env.SHOULD_RUN == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set short SHA
        if: env.SHOULD_RUN == 'true'
        run: echo "SHORT_SHA=${GITHUB_SHA::10}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        if: env.SHOULD_RUN == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        if: env.SHOULD_RUN == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:${{ env.SHORT_SHA }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update GitOps deployment
        if: env.SHOULD_RUN == 'true'
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
            https://api.github.com/repos/kt-cloud-TECHUP-T1/gitops/dispatches \
            -d '{
              "event_type": "deploy-staging",
              "client_payload": {
                "service": "${{ matrix.service }}",
                "image": "${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}",
                "tag": "${{ env.SHORT_SHA }}"
              }
            }'

  build-and-push-anti-macro:
    needs: detect-changes
    if: needs.detect-changes.outputs.anti_macro == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: anti-macro-service/package-lock.json

      - name: Install dependencies
        run: cd anti-macro-service && npm ci

      - name: Build
        run: cd anti-macro-service && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::10}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push anti-macro-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./anti-macro-service/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/anti-macro-service:${{ env.SHORT_SHA }}
            ${{ steps.login-ecr.outputs.registry }}/anti-macro-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update GitOps deployment
        run: |
          curl --fail --show-error -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
            https://api.github.com/repos/kt-cloud-TECHUP-T1/gitops/dispatches \
            -d '{
              "event_type": "deploy-staging",
              "client_payload": {
                "service": "anti-macro-service",
                "image": "${{ steps.login-ecr.outputs.registry }}/anti-macro-service",
                "tag": "${{ env.SHORT_SHA }}"
              }
            }'