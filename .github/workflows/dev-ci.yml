name: CI(DEV) - Build and Push to ECR

on:
  push:
    branches:
      - dev

permissions:
  id-token: write
  contents: read


jobs:
  build:
    name: Build & Push Services
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth-service
          - user-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::10}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:${{ env.SHORT_SHA }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # TODO : GitOps update, ArgoCD에서 CD 수행 예정
      - name: Export image tag for GitOps (auth-service)
        id: export-auth
        if: matrix.service == 'auth-service'
        run: |
          echo "image=${{ steps.login-ecr.outputs.registry }}/auth-service:${{ env.SHORT_SHA }}" >> $GITHUB_OUTPUT

      - name: Export image tag for GitOps (user-service)
        id: export-user
        if: matrix.service == 'user-service'
        run: |
          echo "image=${{ steps.login-ecr.outputs.registry }}/user-service:${{ env.SHORT_SHA }}" >> $GITHUB_OUTPUT