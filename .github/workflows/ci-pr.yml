name: CI(PR) - Test + Docs + Docker Build

on:
  pull_request:
    branches: ["dev"]

permissions:
  contents: read

jobs:
  test-and-docs:
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Ensure swagger-ui dir exists
        run: mkdir -p src/main/resources/static/swagger-ui

      # test 프로필로 단위 테스트 + 문서 복사
      - name: Test + Docs (OpenAPI copy)
        run: ./gradlew --no-daemon clean test copyOasToSwagger --stacktrace

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
          if-no-files-found: warn

      # job 간 공유를 위해 swagger-ui 산출물 전달
      - name: Upload swagger-ui artifact
        uses: actions/upload-artifact@v4
        with:
          name: swagger-ui
          path: src/main/resources/static/swagger-ui
          if-no-files-found: warn

      # 디스코드 알림
      - name: Notify Discord (Test & Docs)
        if: always()
        uses: tsickert/discord-webhook-action@v7
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_PR_CI }}
          content: |
            🧪 PR 검사 결과(테스트/문서): **${{ job.status }}**
            - 레포: ${{ github.repository }}
            - PR: ${{ github.event.pull_request.html_url }}
            - 실행 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  docker-build:
    runs-on: ubuntu-latest
    needs: test-and-docs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download swagger-ui artifact
        uses: actions/download-artifact@v4
        with:
          name: swagger-ui
          path: src/main/resources/static/swagger-ui

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # PR에서는 빌드만 검증 (push 없음)
      - name: Docker build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: pr-check:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 디스코드 알림
      - name: Notify Discord (Docker build)
        if: always()
        uses: tsickert/discord-webhook-action@v7
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_PR_CI }}
          content: |
            🐳 PR 도커 이미지 빌드 결과: **${{ job.status }}**
            - 레포: ${{ github.repository }}
            - PR: ${{ github.event.pull_request.html_url }}
            - 실행 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}