name: CI(PR) - Test + Docs + Docker Build

on:
  pull_request:
    branches: [ "dev" ]

permissions:
  contents: read

jobs:
  test-and-docs:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: popcon
          MYSQL_USER: popcon
          MYSQL_PASSWORD: popcon
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      # application-prod.yml 기반으로 환경변수 주입
      SPRING_PROFILES_ACTIVE: prod

      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: popcon
      DB_USERNAME: popcon
      DB_PASSWORD: popcon

      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Ensure swagger-ui dir exists
        run: mkdir -p src/main/resources/static/swagger-ui

      - name: Install redis-cli & mysql client
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools mysql-client

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            if redis-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG; then
              echo "Redis OK"; exit 0
            fi
            echo "Waiting for Redis..."; sleep 2
          done
          echo "Redis NOT ready"; exit 1

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL OK"; exit 0
            fi
            echo "Waiting for MySQL..."; sleep 2
          done
          echo "MySQL NOT ready"; exit 1

      - name: Test + Docs (OpenAPI 생성/merge/복사)
        run: ./gradlew clean test copyOasToSwagger

  docker-build:
    runs-on: ubuntu-latest
    needs: test-and-docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: pr-check:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max