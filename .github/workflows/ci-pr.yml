name: CI(PR) - Test + Docs + Docker Build

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  # ── 변경된 서비스 감지 ─────────────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.filter.outputs.changes }}

    steps:
      - uses: actions/checkout@v4

      - name: Filter changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth-service:
              - 'auth-service/**'
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
              - 'gradlew'
            user-service:
              - 'user-service/**'
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
              - 'gradlew'
            popup-service:
              - 'popup-service/**'
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
              - 'gradlew'
            auction-service:
              - 'auction-service/**'
              - 'common/**'
              - 'queue-common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
              - 'gradlew'
            draw-service:
              - 'draw-service/**'
              - 'common/**'
              - 'queue-common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
              - 'gradlew'
            queue-service:
              - 'queue-service/**'
              - 'common/**'
              - 'queue-common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
              - 'gradlew'
            queue-worker:
              - 'queue-worker/**'
              - 'common/**'
              - 'queue-common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
              - 'gradlew'
            anti-macro-service:
              - 'anti-macro-service/**'

  # ── 테스트 + Docs ─────────────────────────────────────────────────────────
  test-and-docs:
    needs: detect-changes
    if: needs.detect-changes.outputs.changes != '[]'
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: test

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.changes) }}

    steps:
      - uses: actions/checkout@v4

      # ── Java 서비스 ──────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        if: matrix.service != 'anti-macro-service'
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission for gradlew
        if: matrix.service != 'anti-macro-service'
        run: chmod +x ./gradlew

      - name: Test + Docs
        if: matrix.service != 'anti-macro-service'
        run: ./gradlew --no-daemon :${{ matrix.service }}:clean :${{ matrix.service }}:test :${{ matrix.service }}:bootJar copyOasToSwagger

      - name: Upload test report
        if: failure() && matrix.service != 'anti-macro-service'
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/tests/test
          if-no-files-found: warn

      - name: Upload swagger-ui artifact
        if: matrix.service != 'anti-macro-service'
        uses: actions/upload-artifact@v4
        with:
          name: swagger-ui-${{ matrix.service }}
          path: ${{ matrix.service }}/src/main/resources/static/swagger-ui
          if-no-files-found: warn

      # ── anti-macro-service (Node.js) ─────────────────────────────────────
      - uses: actions/setup-node@v4
        if: matrix.service == 'anti-macro-service'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: anti-macro-service/package-lock.json

      - name: Install & Build (Node)
        if: matrix.service == 'anti-macro-service'
        run: cd anti-macro-service && npm ci && npm run build

      - name: Notify Discord (Test & Docs)
        if: always()
        continue-on-error: true
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_PR_CI }}
          content: |
            🧪 PR 검사 결과 - **${{ matrix.service }}**: **${{ job.status }}**
            - 레포: ${{ github.repository }}
            - PR: <${{ github.event.pull_request.html_url }}>
            - 실행 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ── Docker 빌드 ────────────────────────────────────────────────────────────
  docker-build:
    needs: [detect-changes, test-and-docs]
    if: needs.detect-changes.outputs.changes != '[]'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.changes) }}

    steps:
      # ── Java 서비스 ──────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        if: matrix.service != 'anti-macro-service'

      - uses: actions/setup-java@v4
        if: matrix.service != 'anti-macro-service'
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build jar
        if: matrix.service != 'anti-macro-service'
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :${{ matrix.service }}:bootJar

      # ── anti-macro-service (Node.js) ─────────────────────────────────────
      - uses: actions/checkout@v4
        if: matrix.service == 'anti-macro-service'

      - uses: actions/setup-node@v4
        if: matrix.service == 'anti-macro-service'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: anti-macro-service/package-lock.json

      - name: Install & Build (Node)
        if: matrix.service == 'anti-macro-service'
        run: cd anti-macro-service && npm ci && npm run build

      # ── 공통: Docker 빌드 ────────────────────────────────────────────────
      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          tags: pr-check:${{ matrix.service }}
