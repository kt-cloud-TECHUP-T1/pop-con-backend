spring:
  datasource:
    url: jdbc:h2:mem:popcon
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    defer-datasource-initialization: true

portone:
  api:
    secret: ${PORTONE_API_SECRET}
    store-id: ${PORTONE_STORE_ID}
  url: "https://api.portone.io"

encryption:
  secret: ${ENCRYPTION_SECRET}

internal:
  api-secret: ${INTERNAL_API_SECRET}

draw:
  silent-drop-threshold: ${SILENT_DROP_THRESHOLD}

services:
  user-service:
    url: ${USER_SERVICE_URL}
  ticket-service:
    url: ${TICKET_SERVICE_URL}
  popup-service:
    url: ${POPUP_SERVICE_URL}
