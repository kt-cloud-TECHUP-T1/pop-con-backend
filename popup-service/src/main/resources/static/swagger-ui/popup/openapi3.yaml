openapi: 3.0.1
info:
  title: 팝콘 팝업스토어 서비스 API 명세서
  description: 예약 및 드로우, 굿즈 관리 API
  version: 0.1.0
servers:
- url: http://localhost:8082
tags: []
paths:
  /popups:
    get:
      tags:
      - Popup
      summary: 팝업 목록 조회
      description: |
        팝업 목록을 조회합니다.
        phaseType, phaseStatus 등의 쿼리 파라미터 조합으로 원하는 팝업 목록을 조회할 수 있습니다.

        [현재 제공되는 섹션]
        - 경매: phaseType=AUCTION, phaseStatus=OPEN,UPCOMING
        - 드로우(진행중): phaseType=DRAW, phaseStatus=OPEN
        - 드로우(오픈예정): phaseType=DRAW, phaseStatus=UPCOMING, sort=SOONEST_OPEN

        ※ 향후 다양한 필터 조합 조회를 지원할 예정입니다.

        [쿼리 파라미터]
        - phaseType: AUCTION, DRAW
        - phaseStatus: OPEN, UPCOMING
        - sort: SOONEST_OPEN
        - limit: 조회 개수

        [에러 케이스]
        - 400 (C001): 잘못된 요청값
        - 500 (S001): 서버 오류
      operationId: popup-listings-get-
      parameters:
      - name: phaseType
        in: query
        description: phaseType
        required: false
        schema:
          type: string
      - name: phaseStatus
        in: query
        description: phaseStatus
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: limit
        required: false
        schema:
          type: string
      - name: sort
        in: query
        description: sort
        required: false
        schema:
          type: string
      responses:
        '400':
          description: '400'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-listings-get-fail-invalid-limit:
                  value: "{\r\n  \"code\" : \"C001\",\r\n  \"message\" : \"입력값이 올바\
                    르지 않습니다.\",\r\n  \"data\" : {\r\n    \"limit\" : \"limit는 1 이상\
                    이어야 합니다.\"\r\n  }\r\n}"
                popup-listings-get-fail-invalid-phase-status:
                  value: "{\r\n  \"code\" : \"C001\",\r\n  \"message\" : \"입력값이 올바\
                    르지 않습니다.\"\r\n}"
                popup-listings-get-fail-invalid-phase-type:
                  value: "{\r\n  \"code\" : \"C001\",\r\n  \"message\" : \"입력값이 올바\
                    르지 않습니다.\"\r\n}"
                popup-listings-get-fail-invalid-sort:
                  value: "{\r\n  \"code\" : \"C001\",\r\n  \"message\" : \"입력값이 올바\
                    르지 않습니다.\"\r\n}"
                popup-listings-get-fail-phaseType-null:
                  value: "{\r\n  \"code\" : \"C001\",\r\n  \"message\" : \"입력값이 올바\
                    르지 않습니다.\"\r\n}"
        '500':
          description: '500'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-listings-get-fail-server-error:
                  value: "{\r\n  \"code\" : \"S001\",\r\n  \"message\" : \"시스템 오류가\
                    \ 발생했습니다.\"\r\n}"
        '200':
          description: '200'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-listings-get-success-auction:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"더치 경\
                    매 섹션 조회를 성공했습니다.\",\r\n  \"data\" : {\r\n    \"sectionKey\" :\
                    \ \"AUCTIONS\",\r\n    \"itemCount\" : 0,\r\n    \"items\" : [\
                    \ ]\r\n  }\r\n}"
                popup-listings-get-success-draw-open:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"진행 중\
                    \ 드로우 섹션 조회를 성공했습니다.\",\r\n  \"data\" : {\r\n    \"sectionKey\"\
                    \ : \"DRAWS_OPEN\",\r\n    \"itemCount\" : 0,\r\n    \"items\"\
                    \ : [ ]\r\n  }\r\n}"
                popup-listings-get-success-draw-upcoming:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"오픈 예\
                    정 드로우 섹션 조회를 성공했습니다.\",\r\n  \"data\" : {\r\n    \"sectionKey\"\
                    \ : \"DRAWS_UPCOMING\",\r\n    \"itemCount\" : 0,\r\n    \"items\"\
                    \ : [ ]\r\n  }\r\n}"
  /popups/banners:
    get:
      tags:
      - Popup
      summary: 배너 섹션 조회
      description: |
        홈 화면 상단 배너 섹션 데이터를 조회합니다.

        [쿼리 파라미터]
        - limit: 조회할 배너 개수 (1~5)

        [에러 케이스]
        - 400 (C001): 잘못된 요청값
        - 500 (S001): 서버 오류
      operationId: popup-banners-get-
      parameters:
      - name: limit
        in: query
        description: limit
        required: false
        schema:
          type: string
      responses:
        '400':
          description: '400'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-banners-get-fail-invalid-limit:
                  value: "{\r\n  \"code\" : \"C001\",\r\n  \"message\" : \"입력값이 올바\
                    르지 않습니다.\",\r\n  \"data\" : {\r\n    \"limit\" : \"limit는 1 이상\
                    \ 5 이하여야 합니다.\"\r\n  }\r\n}"
        '500':
          description: '500'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-banners-get-fail-server-error:
                  value: "{\r\n  \"code\" : \"S001\",\r\n  \"message\" : \"시스템 오류가\
                    \ 발생했습니다.\"\r\n}"
        '200':
          description: '200'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-banners-get-success:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"배너 섹\
                    션 조회를 성공했습니다.\",\r\n  \"data\" : {\r\n    \"sectionKey\" : \"\
                    BANNERS\",\r\n    \"itemCount\" : 0,\r\n    \"items\" : [ ]\r\n\
                    \  }\r\n}"
  /popups/{popupId}:
    get:
      tags:
      - Popup
      summary: 팝업스토어 상세 조회
      description: |
        팝업스토어의 상세 정보를 조회합니다.
        로그인 여부에 따라 좋아요(liked) 상태가 포함됩니다.

        [에러 케이스]
        - 500 (S001): 서버 오류
      operationId: popup-detail-get-
      parameters:
      - name: popupId
        in: path
        description: ''
        required: true
        schema:
          type: string
      responses:
        '500':
          description: '500'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-detail-get-fail-server-error:
                  value: "{\r\n  \"code\" : \"S001\",\r\n  \"message\" : \"시스템 오류가\
                    \ 발생했습니다.\"\r\n}"
        '200':
          description: '200'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-detail-get-success:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"팝업스토\
                    어 조회를 성공했습니다.\",\r\n  \"data\" : {\r\n    \"phaseType\" : \"AUCTION\"\
                    ,\r\n    \"phaseStatus\" : \"UPCOMING\",\r\n    \"popupId\" :\
                    \ 1,\r\n    \"liked\" : true,\r\n    \"thumbnailUrl\" : \"https://imagelink.com/thumbnail.jpg\"\
                    ,\r\n    \"images\" : [ \"https://imagelink.com/image1.jpg\",\
                    \ \"https://imagelink.com/image2.jpg\", \"https://imagelink.com/image3.jpg\"\
                    \ ],\r\n    \"subtitle\" : \"Oneira X POPUP SEOUL\",\r\n    \"\
                    title\" : \"오네이라 팝업 스토어\",\r\n    \"viewCount\" : 200,\r\n   \
                    \ \"likeCount\" : 200,\r\n    \"description\" : \"Lee가 101 라인\
                    \ 101주년을 기념해 더현대 서울에서 팝업을 진행합니다.\\uD83D\\uDC56\\n오랜 시간 쌓아온 데님\
                    \ 헤리티지와 101 라인의 상징성을 공간 안에 풀어냈습니다.\\n다양한 리워드와 팝업 기간동안의 특별한 혜택을\
                    \ 받아보세요!\\uD83E\\uDE75\\n\\n[EVENT]\\n① 02.18 PM 1:01 선착순 이벤트\\\
                    n팝업 스토어 촬영 후 인스타그램 스토리 업로드 시, 선착순 101명 볼캡 증정\\n② 구매 금액대별 혜택\\\
                    n40만원 이상 → 반다나 반팔 티셔츠(20명)\\n20만원 이상 → 빅 트위치 로고 투웨이 에코백(30명)\\\
                    n10만원 이상 → 오버롤 미니 파우치(30명)\\n제품 구매 고객 → 금속 뱃지 세트(200명) *ACC 제외\
                    \\n③ 럭키드로우 이벤트\\nLee 공식 인스타그램 팔로우하고 스토리 업로드 시 : 럭키드로우 참여 기회 제공\
                    \\n1등 셀비지 셋업(3명)\\n2등 Lee 빈티지 라벨 티셔츠(5명)\\n3등 스몰 트위치 로고 데님 볼캡\
                    (10명)\\n4등 오버롤 키링(20명)\\n5등 101 원형 뱃지 *컬러 랜덤(1000명)\\n\\n[INFO]\\\
                    n\\uD83D\\uDCCD장소 : 서울 영등포구 여의대로 108, 더현대 서울\\n\\uD83D\\uDCC5일\
                    정 : 2/18(수) ~ 2/25(수)\\n⏰시간 : 월-목 10:30 ~ 20:00 / 금-일 10:30 ~\
                    \ 20:30\\n\",\r\n    \"location\" : \"서울 영등포구 여의대로 108, 더현대 서울\
                    \",\r\n    \"reviewCount\" : 0,\r\n    \"openAt\" : \"2026-02-15\"\
                    ,\r\n    \"closeAt\" : \"2026-03-15\",\r\n    \"weekdayOpen\"\
                    \ : \"11:00:00\",\r\n    \"weekdayClose\" : \"21:00:00\",\r\n\
                    \    \"weekendOpen\" : \"10:00:00\",\r\n    \"weekendClose\" :\
                    \ \"22:00:00\",\r\n    \"auctionUpcoming\" : {\r\n      \"auctionOpenAt\"\
                    \ : \"2026-02-09T10:00:00\",\r\n      \"startPrice\" : 132000\r\
                    \n    },\r\n    \"auctionOpen\" : null,\r\n    \"drawUpcoming\"\
                    \ : null,\r\n    \"drawOpen\" : null\r\n  }\r\n}"
components:
  schemas:
    ApiResponse:
      title: ApiResponse
      type: object
      properties:
        DEFAULT_SUCCESS_MESSAGE:
          type: string
          description: DEFAULT_SUCCESS_MESSAGE
          nullable: true
        code:
          type: string
          description: code
          nullable: true
        SUCCESS:
          type: string
          description: SUCCESS
          nullable: true
        data:
          type: object
          properties:
            sectionKey:
              type: string
              description: sectionKey
              nullable: true
            items:
              type: array
              description: items
              nullable: true
              items:
                oneOf:
                - type: object
                - type: boolean
                - type: string
                - type: number
            itemCount:
              type: number
              description: itemCount
              nullable: true
          description: data
        message:
          type: string
          description: message
          nullable: true
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
- bearerAuth: []
