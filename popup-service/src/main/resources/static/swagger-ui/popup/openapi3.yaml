openapi: 3.0.1
info:
  title: 팝콘 팝업스토어 서비스 API 명세서
  description: 예약 및 드로우, 굿즈 관리 API
  version: 0.1.0
servers:
- url: http://localhost:8082
tags: []
paths:
  /popups:
    get:
      tags:
      - Popup
      summary: 팝업 목록 조회
      description: |
        팝업 목록을 조회합니다.
        phaseType(경매/드로우)과 phaseStatus(진행중/예정/종료)의 조합으로 원하는 팝업 목록을 조회할 수 있습니다.

        [현재 제공되는 섹션]
        - 경매: phaseType=AUCTION, phaseStatus=OPEN,UPCOMING
        - 드로우(진행중): phaseType=DRAW, phaseStatus=OPEN
        - 드로우(오픈예정): phaseType=DRAW, phaseStatus=UPCOMING, sort=SOONEST_OPEN

        ※ phaseStatus는 콤마(,)를 통해 다중 선택이 가능하여 다양한 필터 조합 조회를 지원합니다.

        [쿼리 파라미터]
        - phaseType: AUCTION, DRAW
        - phaseStatus: OPEN, UPCOMING, CLOSED (다중 입력 가능)
        - sort: SOONEST_OPEN (현재는 기본적으로 오픈 일시 빠른 순 정렬)
        - limit: 조회 개수 (기본 10, 1 이상)

        [에러 케이스]
        - 400 (C001): 잘못된 요청값
        - 500 (S001): 서버 오류
      operationId: popup-listings-get-
      parameters:
      - name: phaseType
        in: query
        description: phaseType
        required: false
        schema:
          type: string
      - name: phaseStatus
        in: query
        description: phaseStatus
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: limit
        required: false
        schema:
          type: string
      - name: sort
        in: query
        description: sort
        required: false
        schema:
          type: string
      responses:
        '400':
          description: '400'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-listings-get-fail-invalid-limit:
                  value: "{\r\n  \"code\" : \"C001\",\r\n  \"message\" : \"입력값이 올바\
                    르지 않습니다.\",\r\n  \"data\" : {\r\n    \"limit\" : \"limit는 1 이상\
                    이어야 합니다.\"\r\n  }\r\n}"
                popup-listings-get-fail-invalid-phase-status:
                  value: "{\r\n  \"code\" : \"C001\",\r\n  \"message\" : \"입력값이 올바\
                    르지 않습니다.\"\r\n}"
                popup-listings-get-fail-invalid-phase-type:
                  value: "{\r\n  \"code\" : \"C001\",\r\n  \"message\" : \"입력값이 올바\
                    르지 않습니다.\"\r\n}"
                popup-listings-get-fail-invalid-sort:
                  value: "{\r\n  \"code\" : \"C001\",\r\n  \"message\" : \"입력값이 올바\
                    르지 않습니다.\"\r\n}"
                popup-listings-get-fail-phaseType-null:
                  value: "{\r\n  \"code\" : \"C001\",\r\n  \"message\" : \"입력값이 올바\
                    르지 않습니다.\"\r\n}"
        '500':
          description: '500'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-listings-get-fail-server-error:
                  value: "{\r\n  \"code\" : \"S001\",\r\n  \"message\" : \"시스템 오류가\
                    \ 발생했습니다.\"\r\n}"
        '200':
          description: '200'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-listings-get-success-auction:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"더치 경\
                    매 섹션 조회를 성공했습니다.\",\r\n  \"data\" : {\r\n    \"sectionKey\" :\
                    \ \"AUCTIONS\",\r\n    \"itemCount\" : 0,\r\n    \"items\" : [\
                    \ ]\r\n  }\r\n}"
                popup-listings-get-success-draw-open:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"진행 중\
                    \ 드로우 섹션 조회를 성공했습니다.\",\r\n  \"data\" : {\r\n    \"sectionKey\"\
                    \ : \"DRAWS_OPEN\",\r\n    \"itemCount\" : 0,\r\n    \"items\"\
                    \ : [ ]\r\n  }\r\n}"
                popup-listings-get-success-draw-upcoming:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"오픈 예\
                    정 드로우 섹션 조회를 성공했습니다.\",\r\n  \"data\" : {\r\n    \"sectionKey\"\
                    \ : \"DRAWS_UPCOMING\",\r\n    \"itemCount\" : 0,\r\n    \"items\"\
                    \ : [ ]\r\n  }\r\n}"
  /popups/banners:
    get:
      tags:
      - Popup
      summary: 배너 섹션 조회
      description: |
        홈 화면 상단 배너 섹션 데이터를 조회합니다.

        [쿼리 파라미터]
        - limit: 조회할 배너 개수 (1~5)

        [에러 케이스]
        - 400 (C001): 잘못된 요청값
        - 500 (S001): 서버 오류
      operationId: popup-banners-get-
      parameters:
      - name: limit
        in: query
        description: limit
        required: false
        schema:
          type: string
      responses:
        '400':
          description: '400'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-banners-get-fail-invalid-limit:
                  value: "{\r\n  \"code\" : \"C001\",\r\n  \"message\" : \"입력값이 올바\
                    르지 않습니다.\",\r\n  \"data\" : {\r\n    \"limit\" : \"limit는 1 이상\
                    \ 5 이하여야 합니다.\"\r\n  }\r\n}"
        '500':
          description: '500'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-banners-get-fail-server-error:
                  value: "{\r\n  \"code\" : \"S001\",\r\n  \"message\" : \"시스템 오류가\
                    \ 발생했습니다.\"\r\n}"
        '200':
          description: '200'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-banners-get-success:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"배너 섹\
                    션 조회를 성공했습니다.\",\r\n  \"data\" : {\r\n    \"sectionKey\" : \"\
                    BANNERS\",\r\n    \"itemCount\" : 0,\r\n    \"items\" : [ ]\r\n\
                    \  }\r\n}"
  /popups/{popupId}:
    get:
      tags:
      - Popup
      summary: 팝업스토어 상세 조회
      description: |
        팝업스토어의 상세 정보를 조회합니다.
        로그인 여부에 따라 좋아요(liked) 상태가 포함됩니다.

        [에러 케이스]
        - 500 (S001): 서버 오류
      operationId: popup-detail-get-
      parameters:
      - name: popupId
        in: path
        description: ''
        required: true
        schema:
          type: string
      responses:
        '500':
          description: '500'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-detail-get-fail-server-error:
                  value: "{\r\n  \"code\" : \"S001\",\r\n  \"message\" : \"시스템 오류가\
                    \ 발생했습니다.\"\r\n}"
        '200':
          description: '200'
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                popup-detail-get-success:
                  value: "{\r\n  \"code\" : \"SUCCESS\",\r\n  \"message\" : \"팝업스토\
                    어 조회를 성공했습니다.\",\r\n  \"data\" : {\r\n    \"phaseType\" : null,\r\
                    \n    \"auctionId\" : null,\r\n    \"drawId\" : null,\r\n    \"\
                    popupId\" : 1,\r\n    \"liked\" : false,\r\n    \"thumbnailUrl\"\
                    \ : \"https://example.com/thumb.jpg\",\r\n    \"images\" : [ ],\r\
                    \n    \"title\" : \"테스트 팝업\",\r\n    \"subtitle\" : \"테스트 서브타이\
                    틀\",\r\n    \"viewCount\" : 10,\r\n    \"likeCount\" : 5,\r\n\
                    \    \"description\" : \"테스트 설명\",\r\n    \"location\" : \"서울\
                    \ 성수동\",\r\n    \"reviewCount\" : 3,\r\n    \"openAt\" : \"2026-03-26\"\
                    ,\r\n    \"closeAt\" : \"2026-03-30\",\r\n    \"weekdayOpen\"\
                    \ : \"10:00:00\",\r\n    \"weekdayClose\" : \"20:00:00\",\r\n\
                    \    \"weekendOpen\" : \"11:00:00\",\r\n    \"weekendClose\" :\
                    \ \"21:00:00\"\r\n  }\r\n}"
components:
  schemas:
    ApiResponse:
      title: ApiResponse
      type: object
      properties:
        DEFAULT_SUCCESS_MESSAGE:
          type: string
          description: DEFAULT_SUCCESS_MESSAGE
          nullable: true
        code:
          type: string
          description: code
          nullable: true
        SUCCESS:
          type: string
          description: SUCCESS
          nullable: true
        data:
          type: object
          properties:
            weekdayClose:
              type: string
              description: weekdayClose
              nullable: true
            images:
              type: array
              description: images
              nullable: true
              items:
                oneOf:
                - type: object
                - type: boolean
                - type: string
                - type: number
            popupId:
              type: number
              description: popupId
              nullable: true
            weekendOpen:
              type: string
              description: weekendOpen
              nullable: true
            drawId:
              type: number
              description: drawId
              nullable: true
            description:
              type: string
              description: description
              nullable: true
            likeCount:
              type: number
              description: likeCount
              nullable: true
            title:
              type: string
              description: title
              nullable: true
            closeAt:
              type: string
              description: closeAt
              nullable: true
            liked:
              type: boolean
              description: liked
              nullable: true
            phaseType:
              type: string
              description: phaseType
              nullable: true
            auctionId:
              type: number
              description: auctionId
              nullable: true
            reviewCount:
              type: number
              description: reviewCount
              nullable: true
            subtitle:
              type: string
              description: subtitle
              nullable: true
            weekdayOpen:
              type: string
              description: weekdayOpen
              nullable: true
            location:
              type: string
              description: location
              nullable: true
            viewCount:
              type: number
              description: viewCount
              nullable: true
            openAt:
              type: string
              description: openAt
              nullable: true
            weekendClose:
              type: string
              description: weekendClose
              nullable: true
            thumbnailUrl:
              type: string
              description: thumbnailUrl
              nullable: true
          description: data
        message:
          type: string
          description: message
          nullable: true
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
- bearerAuth: []
