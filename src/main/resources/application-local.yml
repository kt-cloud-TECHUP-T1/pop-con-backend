app:
  oauth:
    base-url: ${OAUTH_BASE_URL}
    redirect-path: /auth/oauth/{provider}/callback
    state-ttl-seconds: ${STATE_TTL_SECONDS:300}

    kakao:
      client-id: ${KAKAO_CLIENT_ID}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      authorize-url: https://kauth.kakao.com/oauth/authorize
      token-url: https://kauth.kakao.com/oauth/token
      userinfo-url: https://kapi.kakao.com/v2/user/me
      scopes: profile_nickname,account_email

    naver:
      client-id: ${NAVER_CLIENT_ID}
      client-secret: ${NAVER_CLIENT_SECRET}
      authorize-url: https://nid.naver.com/oauth2.0/authorize
      token-url: https://nid.naver.com/oauth2.0/token
      userinfo-url: https://openapi.naver.com/v1/nid/me
      scopes: name,email,profile_image

  frontend:
    base-url: ${FRONTEND_BASE_URL}
    home-path: /
    verify-path: /verify
    login-path: /login

spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:mysql://localhost:${DB_PORT}/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    defer-datasource-initialization: true

  data:
    redis:
      host: localhost
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
